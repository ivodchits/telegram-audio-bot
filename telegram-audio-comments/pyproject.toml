[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Each test gets a fresh event loop — we mutate module-level locks in store.py
# and want no cross-test bleed.
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    # pydub uses audioop, which is gone in 3.13+. We pin audioop-lts in
    # requirements but other deps can still poke at it.
    "ignore::DeprecationWarning:pydub",
]

[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["data", "__pycache__"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (catches dead imports — the original motivation)
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "W",   # pycodestyle warnings
]
ignore = [
    "E501",  # line length (we set our own; long log strings are fine)
    "B008",  # function-call in argument defaults (aiogram filters do this)
]

[tool.ruff.lint.per-file-ignores]
# Tests construct deliberately weird input and import lazily.
"tests/*" = ["E402", "B011"]
